name: terraform

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      - name: fmt
        run: terraform fmt -check -recursive
      - name: init
        run: terraform init -backend=false
      - name: validate
        run: terraform validate

  plan:
    runs-on: ubuntu-latest
    needs: validate
    # Plan requires AWS credentials — only run when secrets are configured.
    # Configure these in repo settings → Secrets and variables → Actions:
    #   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
    # For prod-apply (separate workflow), prefer GitHub OIDC over long-lived keys.
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      - name: aws creds
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "AWS credentials not configured — skipping plan."
            echo "Add AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION to repo secrets."
            exit 0
          fi
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
          echo "AWS_REGION=$AWS_REGION" >> "$GITHUB_ENV"
      - name: init
        run: terraform init
      - name: plan
        run: terraform plan -no-color
